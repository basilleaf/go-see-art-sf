name: Run scrapers

on:
  schedule:
    - cron: "0 14 * * 1" # 6am PT every Monday
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/run-all-scrapers.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - run: npx tsx scripts/run-all-scrapers.ts 2>&1 | tee /tmp/scraper-output.txt
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Send summary email
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const { Resend } = require('resend');
          const r = new Resend(process.env.RESEND_API_KEY);
          const logs = fs.existsSync('/tmp/scraper-output.txt')
            ? fs.readFileSync('/tmp/scraper-output.txt', 'utf8')
            : 'No output captured.';
          r.emails.send({
            from: 'Go See Art SF <hello@goseeartsf.com>',
            to: 'lballard.cat@gmail.com',
            subject: 'Scraper run: ' + process.env.JOB_STATUS,
            text: logs,
          }).then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JOB_STATUS: ${{ job.status }}
