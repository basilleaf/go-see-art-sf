name: Run scrapers

on:
  schedule:
    - cron: "0 14 * * 1" # 6am PT every Monday
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Record run start time
        run: date -u +%Y-%m-%dT%H:%M:%SZ > /tmp/scraper-run-start.txt

      - name: Run scrapers (capture output)
        run: npx tsx scripts/run-all-scrapers.ts 2>&1 | tee /tmp/scraper-output.txt
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate HTML report
        if: always()
        run: npx tsx scripts/generate-report.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Send summary email
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const { Resend } = require('resend');
          const r = new Resend(process.env.RESEND_API_KEY);
          const html = fs.existsSync('/tmp/scraper-report.html')
            ? fs.readFileSync('/tmp/scraper-report.html', 'utf8')
            : '<pre>' + (fs.existsSync('/tmp/scraper-output.txt') ? fs.readFileSync('/tmp/scraper-output.txt', 'utf8') : 'No output.') + '</pre>';
          const subject = fs.existsSync('/tmp/scraper-subject.txt')
            ? fs.readFileSync('/tmp/scraper-subject.txt', 'utf8').trim()
            : 'Scraper run: ' + process.env.JOB_STATUS;
          r.emails.send({
            from: 'Go See Art SF <hello@goseeartsf.com>',
            to: 'lballard.cat@gmail.com',
            subject,
            html,
          }).then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); });
          "
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JOB_STATUS: ${{ job.status }}
